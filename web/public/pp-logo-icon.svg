<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 90">
  <!-- Upper pipe body -->
  <g transform="rotate(-18, 55, 30)">
    <rect x="18" y="16" width="74" height="22" rx="11" fill="#c8d2da"/>
    <!-- highlight -->
    <rect x="18" y="16" width="74" height="8" rx="8" fill="#dce4ea" opacity="0.7"/>
  </g>

  <!-- Lower pipe body -->
  <g transform="rotate(-18, 55, 58)">
    <rect x="10" y="44" width="74" height="22" rx="11" fill="#c8d2da"/>
    <rect x="10" y="44" width="74" height="8" rx="8" fill="#dce4ea" opacity="0.7"/>
  </g>

  <!-- Upper pipe end cap (circle) -->
  <ellipse cx="26" cy="30" rx="13" ry="17" fill="#a8b8c4"/>
  <ellipse cx="26" cy="30" rx="10" ry="14" fill="#c4d0d8"/>
  <ellipse cx="26" cy="30" rx="6"  ry="9"  fill="#9fb0bc" opacity="0.5"/>

  <!-- Lower pipe end cap (circle) -->
  <ellipse cx="16" cy="58" rx="13" ry="17" fill="#a8b8c4"/>
  <ellipse cx="16" cy="58" rx="10" ry="14" fill="#c4d0d8"/>
  <ellipse cx="16" cy="58" rx="6"  ry="9"  fill="#9fb0bc" opacity="0.5"/>

  <!-- Upper "P" letter -->
  <text x="14" y="46" font-family="Arial, sans-serif" font-weight="900" font-size="30"
        fill="#1B75BC" letter-spacing="-1">P</text>

  <!-- Lower "p" letter -->
  <text x="4" y="76" font-family="Arial, sans-serif" font-weight="900" font-size="30"
        fill="#1B75BC" letter-spacing="-1">p</text>
</svg>
